<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP3 재생 테스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    h2 { font-size: 18px; margin-bottom: 32px; opacity: 0.6; }
    .card { background: #1e1e1e; border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 360px; text-align: center; }
    .song-num { font-size: 13px; opacity: 0.4; margin-bottom: 8px; }
    .song-title { font-size: 20px; font-weight: 700; margin-bottom: 32px; min-height: 28px; }
    .btn { background: #3b5bff; color: #fff; border: none; border-radius: 50px; padding: 16px 40px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; }
    .btn:disabled { opacity: 0.4; }
    .log { margin-top: 24px; width: 100%; max-width: 360px; font-size: 12px; opacity: 0.4; line-height: 1.8; }
  </style>
</head>
<body>
  <h2>MP3 연속 재생 테스트</h2>
  <div class="card">
    <div class="song-num" id="song-num">-</div>
    <div class="song-title" id="song-title">버튼을 눌러 시작</div>
    <button class="btn" id="btn" onclick="start()">재생 시작</button>
  </div>
  <div class="log" id="log"></div>

  <script>
    const songs = [
      'Indigo Quarter.mp3',
      'Saffron Curtain.mp3',
      'Soft Reset Sunday.mp3',
      'Sweater Over Chair.mp3',
      'Willow Meter.mp3',
    ];

    let idx = 0;
    const audio = new Audio();

    audio.addEventListener('ended', () => {
      idx = (idx + 1) % songs.length;
      playSong(idx);
    });

    audio.addEventListener('error', () => {
      addLog(`❌ 오류: ${songs[idx]}`);
    });

    function playSong(i) {
      audio.src = songs[i];
      audio.play().then(() => {
        document.getElementById('song-num').textContent = `${i + 1} / ${songs.length}`;
        document.getElementById('song-title').textContent = songs[i].replace('.mp3', '');
        addLog(`▶ ${i + 1}번 곡 재생: ${songs[i].replace('.mp3', '')}`);
      }).catch(e => {
        addLog(`❌ play() 실패: ${e.message}`);
      });
    }

    function start() {
      document.getElementById('btn').disabled = true;
      document.getElementById('btn').textContent = '재생 중...';
      playSong(0);
    }

    function addLog(msg) {
      const log = document.getElementById('log');
      log.innerHTML += msg + '<br>';
    }
  </script>
</body>
</html>
