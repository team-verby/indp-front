<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연장 완료 - 인디피 뮤직</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@100..900&display=swap" rel="stylesheet" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://www.indpmusic.co.kr/apple-touch-icon.png" />
  <link rel="stylesheet" href="shared.css" />
  <script src="api.js"></script>
</head>
<body>
  <div class="page-wrap" style="text-align:center;padding-top:80px;">
    <p style="font-size:22px;font-weight:800;margin-bottom:12px;">기간 연장이 완료되었습니다!</p>
    <p style="color:var(--text-gray);margin-bottom:32px;">마이페이지로 이동합니다...</p>
  </div>
  <script>
    (async function() {
      const params = new URLSearchParams(location.search);
      const paymentKey = params.get('paymentKey');
      const orderId = params.get('orderId') || localStorage.getItem('pendingRenewOrderId');
      const amount = parseInt(params.get('amount') || localStorage.getItem('pendingRenewAmount') || '0');
      if (paymentKey && orderId) {
        try {
          await apiFetch('POST', '/api/payments/confirm', {
            paymentType: 'SUBSCRIPTION',
            paymentKey,
            orderId,
            amount
          });
        } catch(e) { console.error(e); }
        localStorage.removeItem('pendingRenewOrderId');
        localStorage.removeItem('pendingRenewAmount');
      }
      setTimeout(() => { window.location.href = 'mypage.html'; }, 1500);
    })();
  </script>
</body>
</html>
