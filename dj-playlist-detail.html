  <style>
    body { background: var(--light-bg); }

    /* ── 2-column layout ── */
    .detail-wrap {
      display: grid;
      grid-template-columns: 60fr 40fr;
      gap: 48px;
      padding: 60px 40px 100px;
      max-width: 1300px;
      margin: 0 auto;
    }

    /* ── Left Column ── */
    .now-playing-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .now-playing-label.live { color: #16a34a; }
    .now-playing-label.standby { color: var(--text-gray); }

    .now-playing-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 2px;
      line-height: 1.25;
    }
    .now-playing-artist {
      font-size: 16px;
      color: var(--text-gray);
      margin-bottom: 20px;
    }

    /* Waveform / progress */
    .audio-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .audio-time {
      font-size: 13px;
      color: var(--text-gray);
      font-weight: 600;
      flex-shrink: 0;
    }
    .waveform-bar {
      flex: 1;
      height: 36px;
      display: flex;
      align-items: center;
      gap: 2px;
      overflow: hidden;
    }
    .waveform-bar span {
      flex: 1;
      border-radius: 2px;
      background: #e5e7eb;
      min-width: 2px;
      transition: background 0.2s;
    }
    .waveform-bar span.played { background: var(--blue); }

    /* Track list */
    .playlist-section-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .playlist-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }
    .playlist-stat-item { display: flex; flex-direction: column; gap: 3px; }
    .playlist-stat-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-light-gray);
      letter-spacing: 0.05em;
    }
    .playlist-stat-value {
      font-size: 16px;
      font-weight: 800;
      color: var(--dark);
    }
    .playlist-stat-divider {
      width: 1px;
      background: #e5e7eb;
      margin: 4px 0;
    }

    .song-list { display: flex; flex-direction: column; gap: 4px; }
    .song-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      cursor: default;
      transition: background 0.15s;
    }
    .song-item:hover { background: #f5f7ff; }
    .song-item.playing { background: #eef0ff; }

    .song-num {
      font-size: 13px;
      color: var(--text-light-gray);
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .song-item.playing .song-num { color: var(--blue); }

    .song-art {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #e8eaf0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      color: var(--text-gray);
    }
    .song-item.playing .song-art { background: var(--blue); color: white; }

    .song-info { flex: 1; min-width: 0; }
    .song-title-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }
    .song-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-item.playing .song-title { color: var(--blue); }
    .song-tag {
      font-size: 11px;
      font-weight: 700;
      color: var(--blue);
      background: #eef0ff;
      padding: 2px 8px;
      border-radius: 100px;
      white-space: nowrap;
    }
    .song-artist {
      font-size: 12px;
      color: var(--text-gray);
      margin-top: 2px;
    }
    .song-duration {
      font-size: 12px;
      color: var(--text-light-gray);
      flex-shrink: 0;
    }
    .song-item.playing .song-duration { color: var(--blue); font-weight: 700; }
    .song-progress-bar {
      height: 2px;
      background: #e5e7eb;
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    .song-progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 2px;
      transition: width 1s linear;
    }

    /* ── Right Column ── */
    .dj-profile-block {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .dj-detail-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b5bff, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .dj-detail-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--dark);
    }
    .dj-detail-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #eef0ff;
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 100px;
      margin-top: 4px;
    }

    .pl-name-big {
      font-size: 30px;
      font-weight: 800;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      line-height: 1.25;
    }
    .live-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 100px;
    }
    .live-status-badge.on {
      background: #dcfce7;
      color: #16a34a;
    }
    .live-status-badge.off {
      background: #f3f4f6;
      color: var(--text-gray);
    }
    .live-dot-green {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #16a34a;
      animation: pulse-green 1.5s infinite;
    }
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(22,163,74,0.4); }
      50%       { box-shadow: 0 0 0 5px rgba(22,163,74,0); }
    }

    .store-info-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: flex-start;
    }
    .store-info-key {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-gray);
      flex-shrink: 0;
      min-width: 60px;
    }
    .store-info-val {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.5;
    }
    .genre-chip {
      display: inline-block;
      border: 1px solid #e5e7eb;
      border-radius: 100px;
      padding: 2px 10px;
      font-size: 13px;
      margin-right: 4px;
    }

    /* Cover art */
    .dj-cover-art {
      width: 100%;
      aspect-ratio: 1 / 0.82;
      border-radius: 24px;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      position: relative;
      overflow: hidden;
    }
    .dj-cover-art::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.4) 100%);
    }

    /* ── Preview bar ── */
    .preview-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(90deg, #fef9ec, #fffbf0);
      border: 1px solid #fcd34d;
      border-radius: 12px;
      padding: 10px 16px;
      margin-top: 20px;
      margin-bottom: 0;
      flex-wrap: wrap;
      gap: 8px;
    }
    .preview-bar-text {
      font-size: 13px;
      font-weight: 700;
      color: #92400e;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .preview-countdown {
      font-size: 13px;
      font-weight: 800;
      color: #d97706;
      min-width: 56px;
    }

    /* ── Preview notice (30초 미리 듣기 안내) ── */
    .preview-notice {
      margin-top: 20px;
      padding: 16px 20px;
      background: linear-gradient(135deg, #f5f3ff, #eff6ff);
      border: 1px solid #c4b5fd;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .preview-notice-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--dark);
    }
    .preview-notice-desc {
      font-size: 13px;
      color: var(--text-gray);
      line-height: 1.55;
      margin-top: -4px;
    }
    .preview-notice-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .preview-notice-btns a {
      padding: 9px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    /* ── Preview ended CTA ── */
    .preview-ended-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      padding: 40px 24px;
      background: linear-gradient(135deg, #f5f3ff, #eff6ff);
      border: 1.5px solid #c4b5fd;
      border-radius: 20px;
      margin-bottom: 36px;
    }
    .preview-ended-icon { font-size: 36px; }
    .preview-ended-title { font-size: 18px; font-weight: 800; color: var(--dark); }
    .preview-ended-desc  { font-size: 14px; color: var(--text-gray); line-height: 1.6; }
    .preview-ended-btns  { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
    .preview-ended-btns a {
      padding: 11px 24px; border-radius: 10px;
      font-size: 14px; font-weight: 700; text-decoration: none;
    }
    .btn-subscribe { background: var(--blue); color: #fff; }
    .btn-login-soft { background: #f3f4f6; color: var(--dark); }

    /* ── Standby state ── */
    .standby-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      padding: 48px 24px;
      background: #f8f9fb;
      border-radius: 20px;
      margin-bottom: 36px;
    }
    .standby-icon { font-size: 40px; opacity: .45; }
    .standby-title { font-size: 18px; font-weight: 800; color: var(--dark); }
    .standby-desc  { font-size: 14px; color: var(--text-gray); line-height: 1.6; }

    /* ── Vinyl record image ── */
    .vinyl-img {
      width: 72%;
      height: auto;
      display: block;
      margin: 0 auto 32px;
      transform-origin: center center;
    }
    .vinyl-img.live {
      animation: vinyl-nudge 1s ease-in-out infinite;
    }
    @keyframes vinyl-nudge {
      0%   { transform: rotate(0deg); }
      15%  { transform: rotate(5deg); }
      35%  { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }

    /* ── Mobile ── */
    @media (max-width: 860px) {
      .detail-wrap {
        grid-template-columns: 1fr;
        padding: 32px 20px 80px;
        gap: 32px;
      }
      .detail-right { order: -1; }
      .pl-name-big  { font-size: 22px; }
      .dj-cover-art { display: none; }
      .vinyl-img { width: 56%; }
    }
  </style>
</head>

          { id:4,  title:'Hold On, We\'re Going Home', artist:'Drake',         duration:'3:47', secs:227 },
          { id:5,  title:'Put It All on Me',      artist:'Ed Sheeran',         duration:'3:53', secs:233 },
          { id:6,  title:'Slow Dancing in the Dark', artist:'Joji',            duration:'3:28', secs:208 },
          { id:7,  title:'Glimpse of Us',         artist:'Joji',               duration:'3:59', secs:239 },
          { id:8,  title:'Peaches',               artist:'Justin Bieber ft. Daniel Caesar', duration:'3:18', secs:198 },
          { id:9,  title:'고백',                  artist:'10cm',               duration:'3:44', secs:224 },
          { id:10, title:'연애소설',              artist:'IU',                 duration:'3:38', secs:218 },
          { id:11, title:'밤편지',                artist:'IU',                 duration:'3:34', secs:214 },
        ]
      },
      6: {
        id: 6, name: '레이트나잇 스터디', djName: 'DJ Minjae',
        genre: '로파이 · 힙합', emoji: '🌙', isLive: false, currentIdx: 0,
        tracks: [
          { id:1,  title:'Snowfall',              artist:'Øneheart × reidenshi', duration:'4:13', secs:253 },
          { id:2,  title:'death bed (coffee for your head)', artist:'Powfu ft. beabadoobee', duration:'3:24', secs:204 },
          { id:3,  title:'Passing Afternoon',     artist:'Iron & Wine',         duration:'3:50', secs:230 },
          { id:4,  title:'Cinnamon',              artist:'Jonah Mutono',        duration:'4:05', secs:245 },
          { id:5,  title:'Intertwined',           artist:'dodie',               duration:'2:39', secs:159 },
          { id:6,  title:'Night Owls',            artist:'Dayglow',             duration:'3:22', secs:202 },
          { id:7,  title:'Better With You',       artist:'Jeremy Zucker',       duration:'3:28', secs:208 },
          { id:8,  title:'comethru',              artist:'Jeremy Zucker',       duration:'3:00', secs:180 },
          { id:9,  title:'늦은 밤 너에게',        artist:'버즈',               duration:'4:01', secs:241 },
        ]
      },
    };

    /* ── 구독 인증 확인 ── */
    const canPlay = !!(getUserToken() || localStorage.getItem('djToken') || getOwnerToken());

    /* ── URL 파라미터로 플레이리스트 로드 ── */
    const plId = parseInt(new URLSearchParams(location.search).get('id')) || 1;
    const pl   = DJ_PLAYLISTS[plId];

    /* 시뮬레이션 상태 */
    let elapsed = pl ? Math.floor(pl.tracks[pl.currentIdx]?.secs * 0.37) : 0;
    let timer   = null;

    /* 프리뷰 상태 (비구독자 + 라이브 채널) */
    const PREVIEW_SECS   = 30;
    const previewMode    = !canPlay && !!(pl?.isLive);
    let   previewElapsed = 0;
    let   previewEnded   = false;

    function fmtTime(s) {
      return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
    }

    function totalSecs(tracks) {
      return tracks.reduce((a, t) => a + t.secs, 0);
    }

    function fmtTotalDur(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      return h > 0 ? `${h}시간 ${m}분` : `${m}분`;
    }

    /* ── 파형 바 생성 ── */
    const WAVE_HEIGHTS = [8,14,22,10,28,6,20,12,26,8,18,24,10,28,14,24,6,20,16,26,9,22,8,26,14,20,10,24,6,18,22,9,28,12,22,7,16,26,11,20,6,27,14,23,18];
    function buildWaveform(currentSecs, totalSecs) {
      const bar = document.getElementById('waveform');
      if (!bar) return;
      const pct = totalSecs > 0 ? currentSecs / totalSecs : 0;
      bar.innerHTML = WAVE_HEIGHTS.map((h, i) => {
        const played = i / WAVE_HEIGHTS.length < pct;
        return `<span style="height:${h}px" class="${played ? 'played' : ''}"></span>`;
      }).join('');
    }

    /* ── 메인 렌더 ── */
    function render() {
      if (!pl) {
        document.title = '플레이리스트를 찾을 수 없습니다 - 인디피 뮤직';
        document.getElementById('detail-left').innerHTML = `
          <div style="padding:60px 0;text-align:center;color:var(--text-gray)">
            <p style="font-size:40px;margin-bottom:16px">🎵</p>
            <p style="font-size:18px;font-weight:800;color:var(--dark);margin-bottom:8px">플레이리스트를 찾을 수 없습니다</p>
            <p style="font-size:14px">존재하지 않거나 삭제된 플레이리스트입니다.</p>
            <a href="playlist.html" style="display:inline-block;margin-top:20px;color:var(--blue);font-weight:700;text-decoration:none;">← 목록으로 돌아가기</a>
          </div>`;
        return;
      }

      document.title = `${pl.name} - 인디피 뮤직`;

      /* ── 오른쪽 컬럼 ── */
      document.getElementById('dj-name').textContent   = pl.djName;
      document.getElementById('pl-name').innerHTML = `${pl.name} <span id="live-badge"></span>`;
      document.getElementById('dj-cover').textContent  = pl.emoji;
      if (pl.isLive && pl.listeners) {
        document.getElementById('pl-listeners').textContent = `${pl.listeners}명 청취 중`;
        document.getElementById('pl-listeners-row').style.display = '';
      }

      const liveBadge = document.getElementById('live-badge');
      if (pl.isLive) {
        liveBadge.className = 'live-status-badge on';
        liveBadge.innerHTML = `<span class="live-dot-green"></span>지금 재생 중`;
      } else {
        liveBadge.className = 'live-status-badge off';
        liveBadge.textContent = '대기 중';
      }

      /* ── 왼쪽: NOW PLAYING / 대기 / 프리뷰 ── */
      if (!pl.isLive) {
        /* 대기 중 (구독 여부 무관) */
        document.getElementById('np-section').innerHTML = `
          <div class="standby-wrap">
            <div class="standby-icon">📻</div>
            <div class="standby-title">현재 재생 중이 아닙니다</div>
            <div class="standby-desc">이 플레이리스트는 현재 방송 중이 아닙니다.<br>DJ가 채널을 시작하면 실시간으로 업데이트됩니다.</div>
          </div>`;
      } else if (previewMode) {
        /* 비구독자 + 라이브 */
        const t = pl.tracks[pl.currentIdx];
        const npEl = document.getElementById('np-section');
        const isLoggedIn = !!getOwnerToken();
        const ctaBtns = isLoggedIn
          ? `<a href="plan.html" class="btn-subscribe">구독하기</a>`
          : `<a href="login.html" class="btn-login-soft">로그인</a>
             <a href="plan.html" class="btn-subscribe">구독하기</a>`;
        npEl.innerHTML = `
          <p class="now-playing-label live" id="np-label">● NOW PLAYING</p>
          <div class="waveform-bar" id="waveform"></div>
          <div class="preview-bar">
            <span class="preview-bar-text">🎵 30초 미리 듣기</span>
            <span class="preview-countdown" id="preview-countdown">남은 시간 ${PREVIEW_SECS}초</span>
          </div>
          <div class="preview-notice">
            <p class="preview-notice-title">전체 재생하려면 구독이 필요합니다</p>
            <p class="preview-notice-desc">Plan A 라이트 구독 시 모든 DJ 플레이리스트를 무제한으로 들을 수 있습니다.<br>월 4,400원</p>
            <div class="preview-notice-btns">${ctaBtns}</div>
          </div>`;
        buildWaveform(elapsed, t.secs);
      } else {
        /* 구독자 + 라이브 */
        const t = pl.tracks[pl.currentIdx];
        document.getElementById('np-label').className = 'now-playing-label live';
        document.getElementById('np-label').textContent = '● NOW PLAYING';
        buildWaveform(elapsed, t.secs);
      }

      /* ── 바이닐 애니메이션 ── */
      const vinylEl = document.getElementById('vinyl-img');
      if (vinylEl) vinylEl.classList.toggle('live', !!pl.isLive);
    }

    /* ── 프리뷰 종료 CTA ── */
    function endPreview() {
      clearInterval(timer);
      previewEnded = true;
      const npEl = document.getElementById('np-section');
      if (!npEl) return;
      npEl.innerHTML = `
        <div class="preview-ended-wrap">
          <div class="preview-ended-icon">🎵</div>
          <div class="preview-ended-title">30초 미리 듣기가 끝났습니다</div>
          <div class="preview-ended-desc">
            전체 재생을 원하신다면 Plan A 라이트 요금제를 구독해 주세요.<br>
            월 4,400원으로 모든 DJ 플레이리스트를 무제한으로 들을 수 있습니다.
          </div>
          <div class="preview-ended-btns">
            <a href="plan.html" class="btn-subscribe">구독 시작하기</a>
            <a href="login.html" class="btn-login-soft">이미 구독 중이신가요?</a>
          </div>
        </div>`;
    }

    /* ── 진행 바 실시간 업데이트 (구독자 or 프리뷰 모드) ── */
    function startTimer() {
      if (!pl || !pl.isLive) return;
      if (!canPlay && !previewMode) return;
      const t = pl.tracks[pl.currentIdx];
      timer = setInterval(() => {
        elapsed++;
        if (elapsed > t.secs) elapsed = 0;

        /* 프리뷰 카운트다운 */
        if (previewMode && !previewEnded) {
          previewElapsed++;
          const remain = PREVIEW_SECS - previewElapsed;
          const countEl = document.getElementById('preview-countdown');
          if (countEl) countEl.textContent = remain > 0 ? `남은 시간 ${remain}초` : '0초';
          if (previewElapsed >= PREVIEW_SECS) { endPreview(); return; }
        }

        buildWaveform(elapsed, t.secs);

      }, 1000);
    }

    render();
    startTimer();
  </script>
</body>
</html>
