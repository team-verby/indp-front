<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xejtkp87wp");

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 인디피 뮤직</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://www.indpmusic.co.kr/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    html, body {
      height: 100%;
    }

    .login-page {
      display: flex;
      height: 100vh;
      min-height: 600px;
    }

    /* ── Left Column ── */
    .login-left {
      flex: 1;
      padding: 24px;
      display: flex;
      align-items: stretch;
    }

    .login-photo {
      width: 100%;
      border-radius: 32px;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ── Right Column ── */
    .login-right {
      flex: 0 0 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 56px;
      background: white;
    }

    .login-form-wrap {
      width: 100%;
      max-width: 360px;
    }

    .login-vinyl {
      width: 120px;
      height: auto;
      display: block;
      margin-bottom: 28px;
    }

    .login-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 16px;
      color: var(--text-gray);
      margin-bottom: 36px;
    }

    .pw-wrap {
      position: relative;
    }

    .pw-wrap .form-input {
      padding-right: 48px;
    }

    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text-gray);
      padding: 0;
      display: flex;
      align-items: center;
    }

    .btn-login {
      width: 100%;
      background: var(--dark);
      color: white;
      border: none;
      border-radius: 100px;
      padding: 18px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn-login:hover { opacity: 0.85; }

    @media (max-width: 900px) {
      .login-left { display: none; }
      .login-right { flex: 1; padding: 40px 32px; }
    }

    @media (max-width: 768px) {
      .login-page {
        min-height: 100svh;
        align-items: center;
      }

      .login-right {
        padding: 40px 24px;
      }

      .login-title {
        font-size: 26px;
      }

      .login-subtitle {
        font-size: 14px;
        margin-bottom: 28px;
      }

      .login-vinyl {
        width: 90px;
        margin-bottom: 20px;
      }
    }

    @media (max-width: 480px) {
      .login-right {
        padding: 32px 20px;
      }

      .login-title {
        font-size: 22px;
      }

      .btn-login {
        padding: 16px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="login-page">

    <!-- Left: Photo -->
    <div class="login-left">
      <img src="photo2.png" alt="매장 사진" class="login-photo" />
    </div>

    <!-- Right: Form -->
    <div class="login-right">
      <div class="login-form-wrap">

        <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--text-gray);text-decoration:none;margin-bottom:24px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
          홈으로
        </a>

        <img src="vinyl.png" alt="인디피 뮤직" class="login-vinyl" />

        <!-- 통합 로그인 폼 -->
        <div id="form-unified">
          <h1 class="login-title">로그인</h1>
          <p class="login-subtitle">인디피 뮤직</p>
          <div class="form-group">
            <label class="form-label" for="login-id">아이디 / 이메일</label>
            <input type="text" id="login-id" class="form-input" placeholder="아이디 또는 이메일을 입력해 주세요"
              onkeydown="if(event.key==='Enter') document.getElementById('login-pw').focus()" />
          </div>
          <div class="form-group">
            <label class="form-label" for="login-pw">비밀번호</label>
            <div class="pw-wrap">
              <input type="password" id="login-pw" class="form-input" placeholder="비밀번호를 입력해 주세요"
                onkeydown="if(event.key==='Enter') handleUnifiedLogin()" />
              <button class="pw-toggle" type="button" onclick="togglePw('login-pw','eye-icon')" aria-label="비밀번호 표시/숨기기">
                <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <p id="login-error" style="font-size:13px;color:#e53e3e;margin-bottom:8px;display:none">아이디/이메일 또는 비밀번호를 확인해 주세요.</p>
          <button class="btn-login" id="btn-login" onclick="handleUnifiedLogin()">로그인</button>
        </div>

      </div>
    </div>

  </div>

  <script src="api.js"></script>
  <script>
    function togglePw(inputId, iconId) {
      const pw = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        pw.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    async function handleUnifiedLogin() {
      const id       = document.getElementById('login-id').value.trim();
      const password = document.getElementById('login-pw').value;
      const errEl    = document.getElementById('login-error');
      const btn      = document.getElementById('btn-login');

      if (!id || !password) { errEl.textContent = '아이디와 비밀번호를 입력해 주세요.'; errEl.style.display = ''; return; }
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '로그인 중...';

      try {
        const data = await apiFetch('POST', '/api/auth/login', { loginId: id, password });

        // 계정 유형 분기.
        // 주의: planType 은 "매장 구독 플랜"이기도 해서 PLAN_A 매장의 점주도 planType=PLAN_A 로 내려온다.
        // 따라서 개인 구독자 vs 매장(점주) 구분은 planType 이 아니라 storeId 존재 여부로 판단한다.
        // (개인 구독자는 storeId=null, 점주는 소유 매장 storeId 가 내려온다.)
        const clearDjToken = () => ['djToken','djRefreshToken','djName'].forEach(k => localStorage.removeItem(k));

        // 계정 유형 판정 기준 (요금제 등급 ≠ 계정 유형):
        //  - DJ(크리에이터): planType === 'DJ'
        //  - 개인 구독자(app_user): PLAN_A 이면서 소유 매장이 없는 계정(storeId 없음)
        //  - 매장(점주): 그 외 — storeId 가 있는 모든 계정(기본 PLAN_A / 프리미엄 PLAN_B 무관)
        if (data.planType === 'DJ') {
          clearUserToken();
          clearOwnerToken();
          localStorage.setItem('djToken', data.accessToken);
          if (data.refreshToken) localStorage.setItem('djRefreshToken', data.refreshToken);
          localStorage.setItem('djName', data.djName || 'DJ');
          window.location.href = 'dj-dashboard.html';
        } else if (data.planType === 'PLAN_A' && !data.storeId) {
          // 개인 구독자 (추후 생성 시). 기본요금제 매장 점주는 storeId 가 있어 여기 해당 안 됨.
          clearOwnerToken();
          clearDjToken();
          setUserToken(data.accessToken, data.refreshToken);
          window.location.href = 'playlist.html?tab=dj';
        } else {
          // 매장(점주) 계정 — 요금제 등급과 무관. 등급별 화면 차이는 마이페이지에서 매장 실제 구독으로 분기.
          clearUserToken();
          clearDjToken();
          setOwnerToken(data.accessToken, data.refreshToken);
          if (data.storeId) setOwnerStoreId(data.storeId);
          window.location.href = 'playlist.html';
        }

      } catch(e) {
        errEl.textContent = '아이디 또는 비밀번호를 확인해 주세요.';
        errEl.style.display = '';
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    }
  </script>

</body>
</html>
